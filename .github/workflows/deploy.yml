name: Deploy Squad Agents

on:
  push:
    branches: [main]
    paths:
      - 'docker/**'
      - 'helm/**'
      - 'scripts/**'
  workflow_dispatch:

env:
  ACR_NAME: squadacr            # Replace with your ACR name
  AKS_CLUSTER: squad-aks        # Replace with your cluster name
  RESOURCE_GROUP: squadrg        # Replace with your resource group
  HELM_RELEASE: squad-agents
  NAMESPACE: squad

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Build & Push to ACR
        run: |
          az acr build \
            --registry ${{ env.ACR_NAME }} \
            --image squad-ralph:${{ github.sha }} \
            --image squad-ralph:latest \
            --file docker/Dockerfile \
            docker/

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Get AKS Credentials
        run: |
          az aks get-credentials \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --name ${{ env.AKS_CLUSTER }} \
            --overwrite-existing

      - name: Helm Deploy
        run: |
          helm upgrade --install ${{ env.HELM_RELEASE }} \
            ./helm/squad-agents \
            --namespace ${{ env.NAMESPACE }} \
            --create-namespace \
            --set global.acrLoginServer=${{ env.ACR_NAME }}.azurecr.io \
            --set global.repository=${{ github.repository }} \
            --set ralph.image.tag=${{ github.sha }} \
            --wait --timeout 5m
