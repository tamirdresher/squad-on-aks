{{- if not .Values.credentials.existingSecret }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "squad.fullname" . }}-credentials
  labels:
    {{- include "squad.labels" . | nindent 4 }}
  annotations:
    helm.sh/hook: pre-install
    helm.sh/hook-weight: "-5"
    # WARNING: Do not commit real tokens to version control.
    # In production, use:
    #   --set credentials.existingSecret=my-external-secret
    # or use External Secrets Operator / Azure Key Vault CSI driver.
type: Opaque
data:
  # Base64-encoded values — set via:
  #   helm install squad ./infrastructure/helm/squad \
  #     --set credentials.ghToken=$(echo -n 'ghp_...' | base64)
  gh-token: {{ .Values.credentials.ghToken | b64enc | quote }}
  copilot-api-key: {{ .Values.credentials.copilotApiKey | b64enc | quote }}
{{- end }}
