{{/*
Service for Ralph — exposes a health/metrics endpoint if needed.
Ralph is primarily a background worker, but a Service enables
Prometheus scraping, readiness checks, and future dashboard integration.
*/}}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "squad.fullname" . }}-ralph
  labels:
    {{- include "squad.ralph.labels" . | nindent 4 }}
spec:
  type: ClusterIP
  ports:
    - port: 8080
      targetPort: 8080
      protocol: TCP
      name: metrics
  selector:
    {{- include "squad.ralph.selectorLabels" . | nindent 4 }}
