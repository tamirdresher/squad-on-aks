# =============================================================================
# values.yaml — Squad Agents Helm chart (AKS-native)
#
# Override these in an environment-specific values file or via --set flags.
# Example:
#   helm upgrade --install squad-agents ./infrastructure/helm/squad-agents \
#     --set global.acrLoginServer=acrsquadprod.azurecr.io \
#     --set global.keyVaultName=kv-squad-prod \
#     --set global.tenantId=<tenant-id> \
#     --set serviceAccount.annotations."azure\.workload\.identity/client-id"=<client-id>
# =============================================================================

# -- Global settings (shared across all agents)
global:
  # GitHub repository in owner/repo format
  repository: "your-org/your-repo"

  # Kubernetes namespace to deploy into
  namespace: "squad"

  # Azure Container Registry login server (e.g. acrsquadprod.azurecr.io)
  # Set at deploy time: --set global.acrLoginServer=...
  acrLoginServer: ""

  # Azure Key Vault name (secrets are mounted via CSI driver)
  # Set at deploy time: --set global.keyVaultName=...
  keyVaultName: ""

  # Azure Tenant ID (required for Key Vault CSI driver)
  # Set at deploy time: --set global.tenantId=...
  tenantId: ""

  # Default Squad model
  defaultModel: "claude-sonnet-4.5"
  defaultTier: "standard"

# -- ServiceAccount
# The single ServiceAccount used by all Squad agent pods.
# Annotated with the Managed Identity client ID for Workload Identity.
serviceAccount:
  create: true
  # Leave empty to auto-generate as "squad-agents"
  name: ""
  annotations:
    # REQUIRED for Workload Identity: set to your Managed Identity client ID
    # azure.workload.identity/client-id: "<IDENTITY_CLIENT_ID>"
  # Workload Identity label is applied automatically by the webhook when the
  # namespace has: azure.workload.identity/use=true

# -- GitHub repository settings
# Used by KEDA github trigger (issue count scaler) and other GitHub-aware components.
github:
  # GitHub org or username that owns the repository
  # Set at deploy time: --set github.owner=<org>
  owner: "your-org"
  # GitHub repository name (single repo, no owner prefix)
  # Set at deploy time: --set github.repo=your-repo
  repo: "your-repo"

# -- Key Vault secrets (mounted via Secrets Store CSI driver)
keyVault:
  # Secret names in Key Vault
  ghTokenSecretName: "squad-gh-token"
  copilotApiKeySecretName: "squad-copilot-api-key"
  # Optional webhook URL secret
  mcpWebhookUrlSecretName: ""

  # Name of the K8s Secret created by the CSI driver (used in envFrom)
  k8sSecretName: "squad-runtime-secrets"

# =============================================================================
# Ralph — Work Monitor (CronJob)
#
# Polls GitHub issues on a schedule, dispatches work to specialist agents.
# Runs as a CronJob rather than a Deployment: cheaper (no always-on pod)
# and mirrors the existing ralph-watch.ps1 scheduled-task pattern.
# =============================================================================
ralph:
  enabled: true

  # CronJob schedule — every 5 minutes
  schedule: "*/5 * * * *"

  # Prevent overlapping runs (mirroring the mutex logic in ralph-watch.ps1)
  concurrencyPolicy: Forbid

  # Retain last 3 successful + 1 failed job
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 1

  # Never restart — OnFailure causes BackOff loops in practice.
  # Let the CronJob schedule handle retries naturally.
  restartPolicy: Never
  backoffLimit: 2

  # TTL for completed Jobs (cleanup after 1 hour)
  ttlSecondsAfterFinished: 3600

  image:
    # Set global.acrLoginServer to construct full image reference
    repository: "squad-agents"
    tag: "latest"
    pullPolicy: IfNotPresent

  # Environment variables passed to ralph-watch.ps1
  env:
    RALPH_LOG_LEVEL: "info"
    RALPH_INTERVAL_SECONDS: "300"
    SQUAD_CONFIG_PATH: "/app/squad.config.ts"
    SQUAD_AGENT_TYPE: "ralph"

  resources:
    limits:
      cpu: "1"
      memory: "2Gi"    # 512Mi causes OOMKilled with Agency CLI
    requests:
      cpu: "200m"
      memory: "256Mi"

  # Disabled by default — uncomment when using dedicated node pools
  nodeSelector: {}
  # nodeSelector:
  #   squad.github.com/pool: monitor

  # Disabled by default — uncomment when using dedicated node pools
  tolerations: []
  # tolerations:
  #   - key: "squad.github.com/pool"
  #     operator: "Equal"
  #     value: "monitor"
  #     effect: "NoSchedule"

  affinity: {}

  podAnnotations: {}

  # ActiveDeadlineSeconds: kill the pod if it runs longer than 30 minutes.
  # Agency CLI rounds can take 10-20 minutes for complex issues.
  # 240s (4 min) was too short and caused premature termination.
  activeDeadlineSeconds: 1800

# =============================================================================
# Picard — Lead Agent (Deployment)
#
# Long-running Deployment: handles architecture decisions, ADR writing,
# and coordinates specialist agents. Always available (min 1 replica)
# but scales up with KEDA when there are open picard-labelled issues.
# =============================================================================
picard:
  enabled: true

  replicaCount: 1

  image:
    repository: "squad-agents"
    tag: "latest"
    pullPolicy: IfNotPresent

  env:
    PICARD_LOG_LEVEL: "info"
    SQUAD_CONFIG_PATH: "/app/squad.config.ts"
    SQUAD_AGENT_TYPE: "picard"

  resources:
    limits:
      cpu: "2"
      memory: "2Gi"
    requests:
      cpu: "500m"
      memory: "512Mi"

  # Disabled by default — uncomment when using dedicated node pools
  nodeSelector: {}
  # nodeSelector:
  #   squad.github.com/pool: agent

  # Disabled by default — uncomment when using dedicated node pools
  tolerations: []
  # tolerations:
  #   - key: "squad.github.com/pool"
  #     operator: "Equal"
  #     value: "agent"
  #     effect: "NoSchedule"

  affinity: {}

  podAnnotations: {}

  # Liveness probe: check that the Picard process is responding
  livenessProbe:
    exec:
      command:
        - pwsh
        - -NoProfile
        - -Command
        - "if ($PSVersionTable.PSVersion.Major -ge 7) { exit 0 } else { exit 1 }"
    initialDelaySeconds: 30
    periodSeconds: 60
    timeoutSeconds: 10
    failureThreshold: 3

  readinessProbe:
    exec:
      command:
        - pwsh
        - -NoProfile
        - -Command
        - "if (Test-Path /tmp/picard-ready) { exit 0 } else { exit 1 }"
    initialDelaySeconds: 10
    periodSeconds: 30
    timeoutSeconds: 5
    failureThreshold: 3

# =============================================================================
# KEDA — Event-driven scaling for Picard
#
# Scales the Picard Deployment based on open GitHub issues labelled squad:picard.
# Requires KEDA to be installed on the cluster:
#   az aks update --enable-keda  (AKS add-on)
# =============================================================================
keda:
  enabled: false   # Set to true once KEDA add-on is installed

  # ── Composite AND mode (issue #1160) ──────────────────────────────────────
  # When false (default): simple ScaledObject — scales on open issue count only.
  # When true: composite AND ScaledObject — scales only when BOTH conditions hold:
  #   1. Open picard-labelled issues exist (work_queue > 0)
  #   2. GitHub API rate-limit remaining exceeds rateLimitThreshold (rate_headroom > 0)
  # Requires github-metrics-exporter (issue #1154) to be deployed.
  compositeMode: false

  # Minimum GitHub API calls remaining before rate-limit gate blocks scaling.
  # The metrics-api trigger compares github_rate_limit_remaining against this.
  # Recommended: 100 (GitHub REST API limit is 5000/hour for authenticated requests)
  rateLimitThreshold: 100

  picard:
    minReplicaCount: 0    # Scale to zero when no open issues
    maxReplicaCount: 5    # Raised from 3 to support composite mode burst capacity
    # Scale up when there are more than this many open picard-labelled issues
    targetIssueCount: "1"
    # Polling interval (seconds)
    pollingInterval: 60
    # Cooldown after scale-down
    cooldownPeriod: 300

  # ── Tier 1: GitHub Actions runner queue trigger (issue #1158) ─────────────
  # Scales on GitHub Actions self-hosted runner queue depth.
  # Independent of the issue-count scaler above.
  githubRunner:
    enabled: false   # Enable separately once runner pool is configured
    minReplicas: 1
    maxReplicas: 10
    pollingInterval: 30
    cooldownPeriod: 300
    runnerScope: "org"
    targetQueueLength: "1"

# =============================================================================
# Azure Monitor / Diagnostics
# =============================================================================
monitoring:
  # Annotate pods for Prometheus scraping (if prometheus-operator is installed)
  prometheus:
    enabled: false
    port: 9090
    path: /metrics

  # Log Analytics workspace resource ID (for future OTel exporter)
  logAnalyticsWorkspaceId: ""
