# Default values for squad helm chart

image:
  registry: squadonaks.azurecr.io
  tag: latest

github:
  org: your-org
  # token is stored in K8s secret 'squad-secrets'

coordinator:
  replicas: 1

ralph:
  watchedRepos: "your-org/squad-on-aks"
  pollIntervalMs: "60000"

agents:
  maxConcurrent: 3
  nodeSelector:
    kubernetes.azure.com/scalesetpriority: spot
  tolerations:
    - key: kubernetes.azure.com/scalesetpriority
      operator: Equal
      value: spot
      effect: NoSchedule

keda:
  enabled: false
  # minReplicas: 0
  # maxReplicas: 5
  # pollingInterval: 30
