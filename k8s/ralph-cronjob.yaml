apiVersion: batch/v1
kind: CronJob
metadata:
  name: ralph
  namespace: squad
  labels:
    app.kubernetes.io/name: ralph
    app.kubernetes.io/part-of: squad
    app.kubernetes.io/component: monitor
spec:
  schedule: "*/5 * * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      backoffLimit: 1
      activeDeadlineSeconds: 240
      template:
        metadata:
          labels:
            app.kubernetes.io/name: ralph
            app.kubernetes.io/part-of: squad
            azure.workload.identity/use: "true"
        spec:
          serviceAccountName: squad-workload-sa
          restartPolicy: Never
          containers:
            - name: ralph
              image: <your-acr-name>.azurecr.io/squad-ralph:latest
              env:
                - name: SQUAD_AGENT_TYPE
                  value: ralph
                - name: GH_TOKEN
                  valueFrom:
                    secretKeyRef:
                      name: squad-kv-secrets
                      key: gh-token
              resources:
                requests:
                  cpu: 250m
                  memory: 256Mi
                limits:
                  cpu: "1"
                  memory: 512Mi
              volumeMounts:
                - name: secrets-store
                  mountPath: /mnt/secrets-store
                  readOnly: true
          volumes:
            - name: secrets-store
              csi:
                driver: secrets-store.csi.k8s.io
                readOnly: true
                volumeAttributes:
                  secretProviderClass: squad-keyvault-sync
