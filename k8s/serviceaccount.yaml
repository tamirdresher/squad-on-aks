apiVersion: v1
kind: ServiceAccount
metadata:
  name: squad-workload-sa
  namespace: squad
  annotations:
    # Workload Identity: bind this SA to the MSI (msi-squad-agents)
    azure.workload.identity/client-id: "<your-msi-client-id>"
  labels:
    app.kubernetes.io/part-of: squad
    azure.workload.identity/use: "true"
